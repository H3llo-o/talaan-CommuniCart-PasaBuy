<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CommuniCart | Auth</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
	<main class="auth_page">
		<section class="auth_header">
			<h1>TaLaan</h1>
			<p>
				Shared grocery requests made simple for neighborhoods and communities.
			</p>
		</section>

		<section class="auth_panel">
			<div class="auth_tabs" role="tablist" aria-label="Authentication Tabs">
				<button class="tab_is_active" type="button">Sign In</button>
				<button class="tab" type="button">Create Account</button>
			</div>

			<form class="auth_form" action="#" method="post">
				<label for="email">Email</label>
				<input id="email" name="email" type="email" placeholder="you@example.com" required>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Enter password" required>

				<div class="auth-row">
					<label class="checkbox-wrap" for="remember">
						<input id="remember" name="remember" type="checkbox">
						Remember me
					</label>
					<a href="#">Forgot password?</a>
				</div>

				<button class="btn-primary" type="submit">Sign In</button>
			</form>

			<p class="auth-footnote">
				New here? <a href="#">Create an account</a>
			</p>
		</section>
	</main>
</body>
</html>
